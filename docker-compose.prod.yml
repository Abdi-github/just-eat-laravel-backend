services:
  nginx:
    image: nginx:1.27-alpine
    container_name: justeat_laravel_nginx_prod
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app_public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - justeat
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.justeat-laravel.rule=Host(`justeat.swiftapp.ch`)"
      - "traefik.http.routers.justeat-laravel.entrypoints=websecure"
      - "traefik.http.routers.justeat-laravel.tls.certresolver=letsencrypt"
      - "traefik.http.services.justeat-laravel.loadbalancer.server.port=80"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: justeat_laravel_api_prod
    restart: always
    expose:
      - "9000"
    env_file:
      - .env.production
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - justeat
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: justeat_laravel_horizon_prod
    restart: always
    command: php artisan horizon
    env_file:
      - .env.production
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      api:
        condition: service_healthy
    networks:
      - justeat

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: justeat_laravel_scheduler_prod
    restart: always
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - .env.production
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      api:
        condition: service_healthy
    networks:
      - justeat

  mysql:
    image: mysql:8.4
    container_name: justeat_mysql_prod
    restart: always
    environment:
      MYSQL_DATABASE: just_eat_prod
      MYSQL_USER: justeat_admin
      MYSQL_PASSWORD: ${DB_PASSWORD:-cd7d74f134bb7ee2671381bc6501e95e}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-55e808edec1f68f4b62c2951d249f236}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - justeat
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: justeat_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-99aa2af836b03d1ec19808d6bd8793e4}
    volumes:
      - redis_data:/data
    networks:
      - justeat
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-99aa2af836b03d1ec19808d6bd8793e4}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  app_public:
  app_storage:
  mysql_data:
  redis_data:

networks:
  justeat:
  traefik:
    external: true